name: build-android-apk

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Install npm dependencies
      run: |
        cd example
        rm -rf node_modules
        npm config set cache "$HOME/.npm-cache"
        npm cache clean --force
        npm install --force

  build:
    needs: install-and-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Install npm dependencies
      run: |
        cd example
        rm -rf node_modules
        npm config set cache "$HOME/.npm-cache"
        npm cache clean --force
        npm install --force

    - name: Overwrite index.js
      run: |
        cd example
        rm index.js
        mv json-demo-build.js index.js

    - name: Overwrite node module
      run: |
        rsync -Rr . example/node_modules/@argyleio/argyle-plugin-react-native

    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Build Android Release
      run: |
        cd example/android
        ./gradlew assembleRelease

    - name: Archive APK
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: apk-app-development-release
        path: example/android/app/build/outputs/apk/release/app-release.apk
